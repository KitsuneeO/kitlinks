<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@KitsuneeO</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="rectangle">
        <div class="avatar-section">
            <div class="avatar">
                <img src="avatar.webp" alt="Avatar">
            </div>
            <div class="info">
                <h2 class="name">@KitsuneeO</h2>
                <p class="description">
                    <span id="animated-text"></span>
                    <span class="cursor">|</span>
                </p>
            </div>
        </div>
        
        <div class="links-section">
            <div class="links-grid">
                <a href="https://www.youtube.com/@KitsuneeO_OG" class="link-card youtube" target="_blank">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube</span>
                </a>
                <a href="https://dc.gg/aircode" class="link-card instagram" target="_blank">
                    <img src="aircd.webp" alt="Air Code" class="custom-icon">
                    <span>Air Code</span>
                </a>
                <a href="https://x.com/KitsuneeO_Off" class="link-card twitter" target="_blank">
                    <i class="fab fa-twitter"></i>
                    <span>Twitter</span>
                </a>
                <a href="https://github.com/KitsuneeO" class="link-card github" target="_blank">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
                <a href="#" class="link-card discord">
                    <i class="fab fa-discord"></i>
                    <span>Discord</span>
                </a>
                <a href="#" class="link-card portfolio">
                    <i class="fas fa-globe"></i>
                    <span>Portfolio</span>
                </a>
            </div>
        </div>
        
        <div class="footer-text">
            <p><img src="rocket-icon.png" alt="🚀" class="footer-icon"> Robie Pluginy Minecraft <span class="separator">|</span> <img src="code-icon.png" alt="💻" class="footer-icon"> dc.gg/aircode <span class="separator">|</span> <img src="sparkle-icon.png" alt="✨" class="footer-icon"> Tworze aplikacje webowe i boty discord</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
